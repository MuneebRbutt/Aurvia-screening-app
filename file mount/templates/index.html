<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurvia · Threshold Checker</title>

  <!-- React & Babel loaded from CDN (no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Card ── */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #58a6ff, #1f6feb);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem; color: #fff;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; color: #e6edf3; }
    .header p  { font-size: 0.78rem; color: #8b949e; margin-top: 1px; }

    /* ── Labels & Inputs ── */
    .field { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #58a6ff; }
    input::placeholder { color: #484f58; }

    /* ── Button ── */
    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.7rem;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Result Badges ── */
    .result {
      margin-top: 1.5rem;
      border-radius: 8px;
      padding: 1.2rem 1.4rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .result.stable {
      background: #0d2b1a;
      border: 1px solid #238636;
    }
    .result.critical {
      background: #2d0f0f;
      border: 1px solid #da3633;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .stable  .result-badge { color: #3fb950; }
    .critical .result-badge { color: #f85149; }

    .result-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .stable  .result-dot  { background: #3fb950; }
    .critical .result-dot { background: #f85149; }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
      margin-top: 0.5rem;
    }
    .stat { font-size: 0.82rem; color: #8b949e; }
    .stat span { color: #e6edf3; font-weight: 600; }

    /* ── Error ── */
    .error-box {
      margin-top: 1.25rem;
      background: #2d0f0f;
      border: 1px solid #da3633;
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      font-size: 0.87rem;
      color: #f85149;
    }

    /* ── Footer note ── */
    .hint {
      font-size: 0.75rem;
      color: #484f58;
      margin-top: 0.35rem;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  /*
   * ThresholdChecker — React Component
   * -----------------------------------
   * State variables:
   *   valuesInput  → the raw comma-separated string the user types
   *   maxVariance  → the max variance number
   *   result       → the JSON response from /api/threshold
   *   error        → any error message to show the user
   *   loading      → true while the fetch is in progress (disables button)
   */
  function ThresholdChecker() {
    const [valuesInput,  setValuesInput]  = React.useState("");
    const [maxVariance,  setMaxVariance]  = React.useState("");
    const [result,       setResult]       = React.useState(null);
    const [error,        setError]        = React.useState(null);
    const [loading,      setLoading]      = React.useState(false);

    // Called when the user clicks "Check Metrics"
    async function handleCheck() {
      // Prevent double-clicks while a request is already running
      if (loading) return;

      // Clear previous result/error
      setResult(null);
      setError(null);
      setLoading(true);

      try {
        // Parse the comma-separated values into an array of numbers
        const parsed = valuesInput
          .split(",")
          .map(s => s.trim())
          .filter(s => s !== "")
          .map(Number);

        // Build the request body
        const body = {
          stream_values: parsed,
          max_variance: parseFloat(maxVariance),
        };

        // Send POST request to the backend
        const response = await fetch("/api/threshold", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await response.json();

        if (!response.ok) {
          // Backend returned 400 or similar — show the error message
          setError(data.detail || "Invalid input. Please check your values.");
        } else {
          setResult(data);
        }

      } catch (err) {
        setError("Could not connect to the server. Make sure the backend is running.");
      } finally {
        // Always re-enable the button when done
        setLoading(false);
      }
    }

    return (
      <div className="card">
        {/* Header */}
        <div className="header">
          <div className="logo">A</div>
          <div>
            <h1>Threshold Checker</h1>
            <p>Aurvia Data Pipeline · Variance Analysis</p>
          </div>
        </div>

        {/* Input: Stream Values */}
        <div className="field">
          <label>Stream Values</label>
          <input
            type="text"
            placeholder="e.g. 10, 15, 22, 19, 8"
            value={valuesInput}
            onChange={e => setValuesInput(e.target.value)}
            disabled={loading}
          />
          <p className="hint">Enter numbers separated by commas</p>
        </div>

        {/* Input: Max Variance */}
        <div className="field">
          <label>Max Variance</label>
          <input
            type="number"
            placeholder="e.g. 5"
            value={maxVariance}
            onChange={e => setMaxVariance(e.target.value)}
            disabled={loading}
          />
          <p className="hint">Maximum allowed deviation from the mean</p>
        </div>

        {/* Submit Button */}
        <button onClick={handleCheck} disabled={loading}>
          {loading ? "Analysing…" : "Check Metrics"}
        </button>

        {/* Error Message */}
        {error && (
          <div className="error-box">
            ⚠ {error}
          </div>
        )}

        {/* Result Badge */}
        {result && (
          <div className={`result ${result.status === "STABLE" ? "stable" : "critical"}`}>
            <div className="result-badge">
              <span className="result-dot"></span>
              {result.status === "STABLE" ? "✔ Stable" : "✖ Critical"}
            </div>
            <div className="result-stats">
              <div className="stat">Mean: <span>{result.mean}</span></div>
              <div className="stat">Max Variance: <span>{result.max_variance}</span></div>
              <div className="stat">Values Count: <span>{result.count}</span></div>
              <div className="stat">Status: <span>{result.status}</span></div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // Mount the React app onto the #root div
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<ThresholdChecker />);
</script>

</body>
</html>
